<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deltarune Wordle</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>Deltarune Wordle</h1>

<div id="gameBoard"></div>

<div class="input-area">
  <input type="text" id="guessInput" placeholder="Character name">
  <button id="submitBtn">Guess</button>
</div>

<table id="gameTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Species / Light-Dark</th>
      <th>First Seen / Chapter</th>
      <th>Role</th>
      <th>Gender</th>
      <th>In Other Game</th>
    </tr>
  </thead>
  <tbody>
    <!-- JS fills rows here -->
  </tbody>
</table>

<script src="js/deltarune.js"></script>
</body>
</html>
